<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contrast proof</title>



<meta property="og:type" content="article">
<meta property="og:title" content="Contrast proof">



<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Contrast proof">


<script type="application/ld+json">{"@context":"https://schema.org","@type":"Article","inLanguage":"en","headline":"Contrast proof"}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#faf8f3;
    --paper-edge:#f3efe6;
    --ink:#2a2520;
    --ink-soft:#5b5248;
    --ink-faint:#8a8073;
    --accent:#9c5a3c;       /* sepia terracotta */
    --accent-deep:#7d4226;
    --rule:#e4ddd0;
    --narr-bg:#f1eada;
    --narr-border:#b8a580;
    --measure:640px;
  }
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:"Newsreader",Georgia,"Times New Roman",serif;
    font-optical-sizing:auto;
    font-size:20px;
    line-height:1.72;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .wrap{
    max-width:var(--measure);
    margin:0 auto;
    padding:0 24px 6rem;
  }

  /* ---- Masthead ---- */
  header.masthead{
    padding:5.5rem 0 0;
    animation:rise .8s cubic-bezier(.2,.7,.2,1) both;
  }
  .overline{
    font-family:"Fraunces",serif;
    font-size:.72rem;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin:0 0 1.4rem;
  }
  /* Masthead-as-home-link (Collection Index spec §6).
     The overline IS the home link — it's already the persistent
     identity line. Subtle hover, no underline by default. */
  a.overline-home{
    color:inherit;
    text-decoration:none;
    border-bottom:1px dotted transparent;
    transition:border-color .12s ease, color .12s ease;
  }
  a.overline-home:hover,
  a.overline-home:focus-visible{
    color:var(--accent-deep);
    border-bottom-color:var(--accent);
    outline:none;
  }
  h1.title{
    font-family:"Fraunces",serif;
    font-optical-sizing:auto;
    font-weight:600;
    font-size:clamp(2.3rem,6vw,3.15rem);
    line-height:1.08;
    letter-spacing:-.012em;
    margin:0 0 1.3rem;
    color:var(--ink);
  }
  .byline{
    display:flex;
    flex-wrap:wrap;
    align-items:center;
    gap:.6rem;
    font-size:.95rem;
    color:var(--ink-soft);
    margin:0 0 1.8rem;
    font-variant-numeric:lining-nums;
  }
  .byline .author{color:var(--ink);font-weight:500;}
  .byline .dot{color:var(--ink-faint);}
  .standfirst{
    font-size:1.18rem;
    line-height:1.62;
    color:var(--ink-soft);
    font-style:italic;
    margin:0 0 2.4rem;
  }
  .rule{
    height:1px;border:0;background:var(--rule);
    margin:0 0 2.6rem;
  }

  /* ---- List of Figures ---- */
  nav.figures{
    background:var(--paper-edge);
    border:1px solid var(--rule);
    border-radius:10px;
    padding:1.4rem 1.6rem 1.5rem;
    margin:0 0 3rem;
    animation:rise .8s .1s cubic-bezier(.2,.7,.2,1) both;
  }
  nav.figures h2{
    font-family:"Fraunces",serif;
    font-size:.78rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--accent-deep);
    margin:0 0 .9rem;
    font-weight:700;
  }
  nav.figures ol{list-style:none;margin:0;padding:0;}
  nav.figures li{margin:0;}
  nav.figures a{
    display:flex;
    align-items:baseline;
    gap:.6rem;
    text-decoration:none;
    color:var(--ink-soft);
    font-size:1rem;
    line-height:1.45;
    padding:.34rem 0;
    border-bottom:1px dotted transparent;
    transition:color .18s;
  }
  nav.figures a:hover{color:var(--accent-deep);}
  nav.figures .fignum{
    font-family:"Fraunces",serif;
    font-weight:600;
    color:var(--accent);
    white-space:nowrap;
    font-size:.95rem;
  }
  nav.toc{
    background:var(--paper-edge);
    border:1px solid var(--rule);
    border-radius:10px;
    padding:1.4rem 1.6rem 1.5rem;
    margin:0 0 2rem;
    animation:rise .8s .05s cubic-bezier(.2,.7,.2,1) both;
  }
  nav.toc h2{
    font-family:"Fraunces",serif;
    font-size:.78rem;
    letter-spacing:.18em;
    text-transform:uppercase;
    color:var(--accent-deep);
    margin:0 0 .9rem;
    font-weight:700;
  }
  nav.toc ol{list-style:none;margin:0;padding:0;counter-reset:toc-l2;}
  nav.toc li{margin:0;}
  nav.toc li.toc-l3{padding-left:1.6rem;}
  nav.toc a{
    display:block;
    text-decoration:none;
    color:var(--ink-soft);
    font-size:1rem;
    line-height:1.5;
    padding:.34rem 0;
    transition:color .18s;
  }
  nav.toc a:hover{color:var(--accent-deep);}
  nav.toc li.toc-l2 > a{color:var(--ink);font-weight:500;}
  nav.figures .leader{
    flex:1;
    border-bottom:1px dotted var(--rule);
    transform:translateY(-.18em);
    min-width:1rem;
  }

  /* ---- Body ---- */
  article p{margin:0 0 1.5rem;}
  article p.lead:first-of-type::first-letter{
    font-family:"Fraunces",serif;
    font-weight:600;
    float:left;
    font-size:3.6rem;
    line-height:.82;
    padding:.12em .12em 0 0;
    color:var(--accent-deep);
  }
  article h2{
    font-family:"Fraunces",serif;
    font-weight:600;
    font-size:1.6rem;
    line-height:1.2;
    margin:2.8rem 0 1rem;
    color:var(--ink);
  }
  article h3{
    font-family:"Fraunces",serif;
    font-weight:600;
    font-size:1.25rem;
    line-height:1.25;
    margin:2.2rem 0 .8rem;
    color:var(--ink);
  }

  /* ---- Figures ---- */
  figure{
    margin:2.8rem 0;
    animation:none;
  }
  figure img{
    width:100%;
    height:auto;
    display:block;
    border-radius:6px;
    box-shadow:0 1px 2px rgba(42,37,32,.06),0 14px 38px -16px rgba(42,37,32,.34);
  }
  figure.portrait img{
    max-width:430px;
    margin:0 auto;
  }
  figcaption{
    margin:.95rem auto 0;
    max-width:90%;
    text-align:center;
    font-size:.94rem;
    line-height:1.5;
    color:var(--ink-faint);
    font-style:italic;
  }
  figcaption .fignum{
    font-family:"Fraunces",serif;
    font-style:normal;
    font-weight:600;
    letter-spacing:.02em;
    color:var(--accent);
    margin-right:.45rem;
  }

  /* ---- Footer ---- */
  footer{
    margin-top:4rem;
    padding-top:1.8rem;
    border-top:1px solid var(--rule);
    font-size:.86rem;
    color:var(--ink-faint);
    line-height:1.6;
  }
  footer .mark{font-family:"Fraunces",serif;color:var(--accent);font-weight:600;}

  /* ---- Reading nav: bottom prev/next (sits ABOVE the document footer) ---- */
  nav.docnav{
    margin-top:3.5rem;
    padding-top:1.8rem;
    border-top:1px solid var(--rule);
    display:flex;
    align-items:stretch;
    gap:.8rem;
    flex-wrap:wrap;
  }
  nav.docnav a{
    flex:1;
    min-width:150px;
    text-decoration:none;
    color:inherit;
    border:1px solid var(--rule);
    border-radius:10px;
    padding:.8rem 1rem;
    background:#fffdf9;
    transition:transform .15s, border-color .15s;
  }
  nav.docnav a:hover{transform:translateY(-2px); border-color:#d9cdb8;}
  nav.docnav .dir{
    font-family:"Fraunces",serif;
    font-size:.68rem;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
    margin:0 0 .25rem;
  }
  nav.docnav .nm{
    font-family:"Fraunces",serif;
    font-weight:600;
    color:var(--ink);
    font-size:.98rem;
  }
  nav.docnav a.home{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:"Fraunces",serif;
    font-weight:600;
    color:var(--accent-deep);
  }
  nav.docnav a.next{text-align:right;}

  /* ---- Reading nav: floating back-to-top ---- */
  .totop{
    position:fixed;
    right:18px;
    bottom:18px;
    z-index:50;
    width:44px;
    height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background:var(--accent);
    color:#fff;
    border:none;
    cursor:pointer;
    font-size:1.1rem;
    box-shadow:0 8px 22px -8px rgba(124,66,38,.6);
    opacity:0;
    pointer-events:none;
    transition:opacity .25s, transform .25s;
    transform:translateY(8px);
  }
  .totop.show{opacity:1; pointer-events:auto; transform:none;}
  .totop:hover{background:var(--accent-deep);}
  @media (prefers-reduced-motion:reduce){
    .totop{transition:none!important;}
  }

  a.figback{color:inherit;text-decoration:none;}

  /* ---- Footnotes (inline, co-located) ---- */
  /* Marker left in the prose. Smaller, sepia, superscript — reads as a
     reference, no link (the note sits immediately below). */
  sup.fn-ref{
    font-family:"Fraunces",serif;
    font-size:.62em;
    font-weight:700;
    color:var(--accent);
    vertical-align:super;
    line-height:0;
    padding-left:.06em;
  }
  /* The note itself: indented, smaller, thin sepia left border so it
     reads as an aside, not body text. Sits right after its paragraph. */
  aside.footnote{
    margin:.35rem 0 1.15rem 0;
    padding:.15rem 0 .15rem 1rem;
    border-left:2px solid var(--accent);
    font-size:.86rem;
    line-height:1.55;
    color:var(--ink-soft);
  }
  aside.footnote .fn-num{
    font-family:"Fraunces",serif;
    font-weight:700;
    color:var(--accent);
    margin-right:.5rem;
  }
  aside.footnote p{margin:0;}

  /* ---- Narrative (author's reflective voice) ---- */
  /* Body-size upright serif in a warm tinted panel. Deliberately distinct
     from aside.footnote on all three axes: SIZE (1em vs .86rem), TINT
     (warm --narr-bg panel vs untinted), MARKER (none vs numbered fn-num). */
  div.narrative{
    background:var(--narr-bg);
    border-left:3px solid var(--narr-border);
    border-radius:0 10px 10px 0;
    padding:1.05rem 1.25rem;
    margin:1.6rem 0;
  }
  div.narrative p{margin:0 0 1.05rem;}
  div.narrative p:last-child{margin-bottom:0;}
  div.narrative .narrative-label{
    font-family:ui-sans-serif,system-ui,"Helvetica Neue",Arial,sans-serif;
    font-variant-caps:all-small-caps;
    letter-spacing:.14em;
    font-size:.78rem;
    font-weight:600;
    color:var(--ink-soft);
    margin:0 0 .55rem;
  }

  @keyframes rise{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;}}

  @media (max-width:520px){
    body{font-size:18px;}
    header.masthead{padding-top:3.5rem;}
    nav.figures{padding:1.2rem 1.2rem 1.3rem;}
  }

</style>
</head>
<body>

<div class="wrap" id="top">


  <header class="masthead">
    
    <h1 class="title">Contrast proof</h1>
    <p class="byline">
      
      
      
    </p>
    
    <hr class="rule">
  </header>

  

  

  <article>
    
      
        <p class="lead">An ordinary paragraph.</p>
      
    
      
        <div class="narrative">
          
          
          <p>A reflective author voice passage.</p>
          
        </div>
      
    
      
        <aside class="footnote" role="note">
          <span class="fn-num">1</span>A numbered footnote note.
        </aside>
      
    
  </article>

  
  

  


</div>



<button class="totop" id="totop" type="button" aria-label="Back to top">↑</button>
<script>
(function(){
  var totop = document.getElementById('totop');
  if(!totop) return;
  function reduced(){ return window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; }
  function toTop(){ window.scrollTo({top:0, behavior: reduced() ? 'auto' : 'smooth'}); }
  function onScroll(){ totop.classList.toggle('show', window.scrollY > 600); }
  window.addEventListener('scroll', onScroll, {passive:true});
  onScroll();
  totop.addEventListener('click', toTop);
})();
</script>
</body>
</html>
